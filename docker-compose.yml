services:
  app:
    build: .
    container_name: app
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/mydb
    ports:
      - "80:5000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
    name: mongo-data

networks:
  default:
    name: app-network
